<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Folder Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link id="hljs-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff; --bg-alt: #eef0f4; --bg-hover: #f0f2f6;
      --surface: #f1f3f6; --border: #dde1e8;
      --accent: #5c6bc0; --accent-light: #eef0fb;
      --text: #1a1d23; --text-muted: #64748b; --text-light: #a0aab8;
      --code-bg: #f7f8fb; --code-text: #b0283a;
      --section-bg: #ffffff; --section-border: #e4e8ef;
      --tree-w: 248px; --toc-w: 210px; --topbar-h: 50px;
      --radius: 10px; --radius-sm: 5px;
      --shadow: 0 1px 4px rgba(0,0,0,.07);
      --shadow-md: 0 4px 20px rgba(0,0,0,.13);
      --shadow-section: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--section-border);
    }
    [data-theme="dark"] {
      --bg: #1e1e2e; --bg-alt: #13131f; --bg-hover: #2a2a3e;
      --surface: #252535; --border: #3a3a54;
      --accent: #89b4fa; --accent-light: #1a2840;
      --text: #cdd6f4; --text-muted: #6c7086; --text-light: #45475a;
      --code-bg: #12121e; --code-text: #f38ba8;
      --section-bg: #1e1e2e; --section-border: #2e2e48;
    }

    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-alt); color: var(--text); line-height: 1.6; overflow: hidden; }

    /* ── Welcome ── */
    #welcome {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: linear-gradient(135deg, var(--bg-alt) 0%, var(--bg) 100%);
    }
    .w-logo { font-size: 72px; line-height: 1; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .w-title { font-size: 30px; font-weight: 700; color: var(--text); letter-spacing: -.5px; }
    .w-sub { font-size: 14px; color: var(--text-muted); text-align: center; max-width: 360px; line-height: 1.6; }
    .w-btn {
      display: flex; align-items: center; gap: 8px; padding: 13px 32px;
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
      transition: opacity .15s, transform .15s; font-family: inherit;
    }
    .w-btn:hover { opacity: .88; transform: translateY(-2px); }
    .w-pills { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
    .w-pill { font-size: 12px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; }
    .w-note { font-size: 11px; color: var(--text-light); margin-top: 8px; text-align: center; }
    #w-fallback { font-size: 11px; color: var(--text-muted); display: none; margin-top: 4px; }
    #w-reopen { min-height: 38px; display: flex; align-items: center; justify-content: center; }
    .w-reopen-btn {
      display: flex; align-items: center; gap: 8px; padding: 9px 22px;
      background: var(--bg); border: 1.5px solid var(--accent); color: var(--accent);
      border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .15s, transform .15s; font-family: inherit;
    }
    .w-reopen-btn:hover { background: var(--accent-light); transform: translateY(-1px); }
    .w-reopen-btn .rp-name { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .w-loading {
      font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .w-spinner { display: inline-block; animation: spin .8s linear infinite; }
    .w-theme {
      position: fixed; top: 16px; right: 16px;
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--bg); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    }

    /* ── App ── */
    #app { display: none; flex-direction: column; height: 100vh; }

    /* Progress bar */
    #prog {
      position: fixed; top: 0; left: 0; height: 2px; width: 0;
      background: var(--accent); z-index: 1000; transition: width .08s;
    }

    /* ── Topbar ── */
    .topbar {
      height: var(--topbar-h); display: flex; align-items: center; gap: 6px;
      padding: 0 10px; background: var(--bg); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 100;
    }
    .tb-btn {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer; border-radius: var(--radius-sm);
      font-size: 15px; color: var(--text-muted); transition: background .12s; flex-shrink: 0;
    }
    .tb-btn:hover { background: var(--surface); color: var(--text); }
    #hamburger { display: none; }
    #breadcrumb {
      flex: 1; font-size: 12px; color: var(--text-muted);
      display: flex; align-items: center; gap: 3px; min-width: 0; overflow: hidden;
    }
    #breadcrumb span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #breadcrumb .bc-root { font-weight: 600; color: var(--text); flex-shrink: 0; }
    #breadcrumb .bc-sep { color: var(--text-light); flex-shrink: 0; }
    #breadcrumb .bc-file { font-weight: 500; color: var(--accent); }
    .search-box {
      display: flex; align-items: center; gap: 4px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0 8px; height: 30px;
    }
    .search-box:focus-within { border-color: var(--accent); background: var(--bg); }
    #search { border: none; background: none; outline: none; font-size: 12px; color: var(--text); width: 130px; font-family: inherit; }
    #search::placeholder { color: var(--text-light); }
    #search-x { border: none; background: none; cursor: pointer; font-size: 15px; color: var(--text-muted); padding: 0; line-height: 1; display: none; }
    #search-x:hover { color: var(--text); }
    #rtime { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .open-btn {
      display: flex; align-items: center; gap: 5px; padding: 0 10px; height: 28px;
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: opacity .15s; font-family: inherit;
    }
    .open-btn:hover { opacity: .85; }

    /* ── Workspace ── */
    .workspace { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── Tree Panel ── */
    #tree-panel {
      width: var(--tree-w); flex-shrink: 0; background: var(--bg);
      border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
    }
    .tree-hd {
      display: flex; align-items: center; gap: 6px; padding: 8px 10px;
      border-bottom: 1px solid var(--border); min-height: 38px; flex-shrink: 0;
    }
    #root-name { flex: 1; font-size: 12px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cnt-badge { font-size: 10px; color: var(--text-muted); background: var(--surface); padding: 1px 6px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    #tree-body { flex: 1; overflow-y: auto; padding: 4px 0; }

    /* Tree items */
    .tf, .td-hd {
      display: flex; align-items: center; gap: 4px; height: 26px;
      cursor: pointer; border-left: 2px solid transparent;
      transition: background .1s; user-select: none; padding-right: 6px;
    }
    .tf:hover, .td-hd:hover { background: var(--bg-hover); }
    .tf.active { background: var(--accent-light); border-left-color: var(--accent); }
    .tf.active .tn { color: var(--accent); font-weight: 500; }
    .ti { font-size: 12px; flex-shrink: 0; }
    .tn { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .chev { font-size: 8px; color: var(--text-muted); transition: transform .15s; flex-shrink: 0; width: 10px; display: inline-block; }
    .chev.open { transform: rotate(90deg); }
    .fcnt { font-size: 10px; color: var(--text-light); margin-left: auto; flex-shrink: 0; padding-right: 2px; }
    .td-ch { overflow: hidden; }
    .td-ch.coll { display: none; }
    .t-empty { font-size: 11px; color: var(--text-muted); padding: 14px 10px; text-align: center; }
    .ctx-badge {
      font-size: 9px; font-weight: 600; color: var(--accent);
      background: var(--accent-light); padding: 1px 6px; border-radius: 8px;
      margin-left: auto; flex-shrink: 0; white-space: nowrap; line-height: 16px;
    }

    /* ── Content stats bar ── */
    #c-stats {
      display: none; justify-content: flex-end; align-items: center; gap: 6px;
      padding: 8px 0 14px; flex-wrap: wrap;
    }
    .cst-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--section-bg); border: 1px solid var(--section-border);
      border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--text-muted);
      box-shadow: var(--shadow);
    }
    .cst-chip .cst-icon { font-size: 13px; }
    .cst-chip .cst-num { font-weight: 700; color: var(--text); font-size: 13px; }
    .cst-chip .cst-unit { font-size: 11px; }

    /* ── Frontmatter metadata card ── */
    .md-frontmatter {
      background: var(--section-bg); border: 1px solid var(--section-border);
      border-radius: var(--radius); box-shadow: var(--shadow-section);
      padding: 14px 18px; margin-bottom: 14px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px;
    }
    .fm-row { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .fm-key {
      font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .fm-val {
      font-size: 13px; color: var(--text); line-height: 1.5;
      word-break: break-word;
    }
    .fm-val code {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px; color: var(--accent);
    }
    /* Pill list for comma-separated values like allowed-tools */
    .fm-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .fm-pill {
      font-size: 11px; background: var(--accent-light); color: var(--accent);
      border-radius: 20px; padding: 1px 8px; font-weight: 500;
    }

    /* ── Content Panel ── */
    #content-panel {
      flex: 1; overflow-y: auto; padding: 32px 40px; background: var(--bg-alt); min-width: 0;
      scroll-behavior: smooth;
    }
    .md-body { max-width: 800px; margin: 0 auto; }

    /* ── Section cards ── */
    .md-section {
      background: var(--section-bg); border-radius: var(--radius);
      box-shadow: var(--shadow-section);
      padding: 24px 28px; margin-bottom: 14px;
    }
    .md-section > h2:first-child {
      margin-top: 0; padding-top: 0; border-bottom: none;
      padding-bottom: 12px; border-bottom: 1px solid var(--section-border);
      margin-bottom: 16px;
    }
    .md-intro {
      background: var(--section-bg); border-radius: var(--radius);
      box-shadow: var(--shadow-section);
      padding: 24px 28px; margin-bottom: 14px;
    }
    /* H1 title card — accent left border */
    .md-title-card {
      background: var(--section-bg); border-radius: var(--radius);
      box-shadow: var(--shadow-section);
      padding: 22px 28px 18px; margin-bottom: 14px;
      border-left: 4px solid var(--accent);
    }
    .md-title-card h1 { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    /* Heading icons */
    .h-icon { margin-right: 6px; font-style: normal; }

    /* ── Section header accent strip ── */
    .md-section > h2:first-child { display: flex; align-items: center; gap: 0; }
    .c-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 65vh; gap: 10px; color: var(--text-muted); text-align: center;
    }
    .c-empty .ei { font-size: 52px; }
    .c-empty .et { font-size: 16px; font-weight: 600; color: var(--text); margin-top: 4px; }
    .c-empty .es { font-size: 13px; }

    /* Markdown typography */
    .md-body h1 { font-size: 26px; font-weight: 700; margin: 0 0 4px; line-height: 1.3; }
    .md-body h2 { font-size: 18px; font-weight: 700; margin: 28px 0 12px; }
    .md-body h3 { font-size: 14.5px; font-weight: 600; margin: 20px 0 8px; color: var(--text); display: flex; align-items: center; gap: 0; }
    .md-body h4 { font-size: 11.5px; font-weight: 600; margin: 16px 0 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; }
    .md-body p { margin: 0 0 13px; font-size: 14.5px; line-height: 1.78; }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body strong { font-weight: 700; }
    .md-body em { font-style: italic; }
    .md-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px; color: var(--code-text);
    }
    .md-body pre {
      background: var(--code-bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; overflow-x: auto; margin: 0 0 16px; position: relative;
    }
    .md-body pre code { background: none; border: none; padding: 0; color: var(--text); font-size: 13px; line-height: 1.6; }
    .copy-btn {
      position: absolute; top: 8px; right: 8px; padding: 3px 9px; font-size: 11px;
      font-family: 'Inter', sans-serif; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer; color: var(--text-muted); transition: background .1s;
    }
    .copy-btn:hover { background: var(--border); color: var(--text); }
    .lang-badge {
      position: absolute; top: 9px; right: 64px; font-size: 10px;
      font-family: 'JetBrains Mono', monospace; color: var(--text-light);
      text-transform: uppercase; letter-spacing: .05em; pointer-events: none;
    }
    .md-body blockquote {
      border-left: 3px solid var(--accent); background: var(--accent-light);
      padding: 10px 16px; margin: 0 0 16px; border-radius: 0 var(--radius) var(--radius) 0;
    }
    .md-body blockquote p { margin: 0; font-size: 13.5px; color: var(--text-muted); }
    .md-body ul, .md-body ol { margin: 0 0 13px; padding-left: 24px; font-size: 14.5px; }
    .md-body li { margin-bottom: 4px; line-height: 1.7; }
    .md-body li > ul, .md-body li > ol { margin: 4px 0 0; }
    .md-body input[type="checkbox"] { margin-right: 6px; accent-color: var(--accent); }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
    .md-body table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 0 0 16px; }
    .md-body th { background: var(--surface); padding: 8px 12px; text-align: left; font-weight: 600; font-size: 12px; border: 1px solid var(--border); }
    .md-body td { padding: 8px 12px; border: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
    .md-body tr:nth-child(even) td { background: var(--bg); }
    .md-body img { max-width: 100%; border-radius: var(--radius-sm); }

    /* ── TOC Panel ── */
    #toc-panel {
      width: var(--toc-w); flex-shrink: 0; background: var(--bg);
      border-left: 1px solid var(--border); overflow-y: auto; padding: 14px 0;
    }
    #toc-panel.hidden { display: none; }
    .toc-lbl { padding: 0 14px 8px; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
    .toc-a {
      display: block; padding: 4px 12px; font-size: 11.5px; color: var(--text-muted);
      text-decoration: none; line-height: 1.4; border-left: 2px solid transparent;
      transition: color .1s, background .1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .toc-a:hover { color: var(--text); background: var(--bg-hover); }
    .toc-a.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-light); font-weight: 500; }
    .toc-a.h2 { padding-left: 20px; }
    .toc-a.h3 { padding-left: 30px; font-size: 11px; }

    /* ── Back to top ── */
    #btop {
      position: fixed; bottom: 22px; right: 22px; width: 34px; height: 34px;
      background: var(--accent); color: #fff; border: none; border-radius: 50%;
      font-size: 15px; cursor: pointer; opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s; z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    #btop.on { opacity: 1; pointer-events: auto; }
    #btop:hover { transform: translateY(-2px); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      background: #1a1a2e; color: #fff; padding: 7px 18px; border-radius: 20px;
      font-size: 12px; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 999; white-space: nowrap;
    }
    [data-theme="dark"] #toast { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    #toast.on { opacity: 1; }

    /* ── Lang switcher ── */
    .lang-sw {
      display: flex; gap: 2px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 2px; flex-shrink: 0;
    }
    .lang-opt {
      padding: 2px 8px; font-size: 11px; font-weight: 600;
      border: none; background: none; cursor: pointer; border-radius: 3px;
      color: var(--text-muted); font-family: inherit; transition: background .1s, color .1s; line-height: 18px;
    }
    .lang-opt:hover { background: var(--bg-hover); color: var(--text); }
    .lang-opt.active { background: var(--accent); color: #fff; }
    .w-controls { position: fixed; top: 16px; right: 16px; display: flex; align-items: center; gap: 8px; }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Responsive ── */
    @media (max-width: 1100px) { #toc-panel { display: none !important; } }
    @media (max-width: 720px) {
      #hamburger { display: flex !important; }
      .search-box { display: none; }
      #rtime { display: none; }
      #tree-panel {
        position: fixed; z-index: 200; top: var(--topbar-h); bottom: 0;
        left: calc(-1 * var(--tree-w)); transition: left .22s; box-shadow: none;
      }
      #tree-panel.mob-open { left: 0; box-shadow: var(--shadow-md); }
      #content-panel { padding: 24px 18px; }
    }
  </style>
</head>
<body>

<!-- ── Welcome ── -->
<div id="welcome">
  <div class="w-controls">
    <div class="lang-sw" id="w-lang-sw">
      <button class="lang-opt" data-lang="en">EN</button>
      <button class="lang-opt" data-lang="vi">VI</button>
      <button class="lang-opt" data-lang="zh">中文</button>
    </div>
    <button class="w-theme" id="w-theme-btn" title="Toggle dark mode">🌙</button>
  </div>
  <div class="w-logo">📚</div>
  <div class="w-title">MD Folder Viewer</div>
  <div class="w-sub" id="w-sub"></div>
  <div id="w-reopen"></div>
  <button class="w-btn" id="w-open-btn"></button>
  <div class="w-note" id="w-note"></div>
  <div id="w-fallback"></div>
  <div class="w-pills" id="w-pills"></div>
</div>

<!-- ── App ── -->
<div id="app">
  <div id="prog"></div>
  <header class="topbar">
    <button class="tb-btn" id="hamburger" title="Toggle tree">☰</button>
    <div id="breadcrumb"><span class="bc-root">—</span></div>
    <div class="search-box">
      <span style="font-size:12px;color:var(--text-muted)">🔍</span>
      <input id="search" placeholder="" autocomplete="off" spellcheck="false">
      <button id="search-x">×</button>
    </div>
    <span id="rtime"></span>
    <div class="lang-sw" id="app-lang-sw">
      <button class="lang-opt" data-lang="en">EN</button>
      <button class="lang-opt" data-lang="vi">VI</button>
      <button class="lang-opt" data-lang="zh">中文</button>
    </div>
    <button class="tb-btn" id="theme-btn" title="Toggle dark mode">🌙</button>
    <button class="open-btn" id="open-btn"></button>
  </header>
  <div class="workspace">
    <!-- Tree -->
    <aside id="tree-panel">
      <div class="tree-hd">
        <span id="root-name">—</span>
        <span class="cnt-badge" id="cnt-badge">0 files</span>
      </div>
      <div id="tree-body"></div>
    </aside>
    <!-- Content -->
    <main id="content-panel">

// ── Helpers ──
function id(s) { return document.getElementById(s); }
function ls(k, v) { try { if (v !== undefined) localStorage.setItem(k, v); else return localStorage.getItem(k); } catch(e) {} }
function toast(msg, ms = 2200) {
  const t = id('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('on'), ms);
}

// ── Theme ──

  ls('mdv-theme', t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

// ── IndexedDB handle persistence ──
function openHandleDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('mdv-db', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}
async function saveHandle(handle) {
  try {
    const db = await openHandleDB();
    await new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readwrite');
      tx.objectStore('handles').put(handle, 'last');
      tx.oncomplete = res; tx.onerror = rej;
    });
    db.close();
    ls('mdv-last-name', handle.name); // fast read for display
  } catch(e) {}
}
async function getSavedHandle() {
  try {
    const db = await openHandleDB();
    const handle = await new Promise((res, rej) => {
      const req = db.transaction('handles', 'readonly').objectStore('handles').get('last');
      req.onsuccess = e => res(e.target.result || null);
      req.onerror = rej;
    });
    db.close();
    return handle;
  } catch(e) { return null; }
}

// ── Check & restore saved folder on startup ──
async function checkSavedFolder() {
  if (!('showDirectoryPicker' in window)) return;
  const savedName = ls('mdv-last-name');
  if (!savedName) return;

  const wrap = id('w-reopen');
  // Show loading state instantly using saved name
  wrap.innerHTML = `<div class="w-loading"><span class="w-spinner">⟳</span> ${t('checking', savedName)}</div>`;

  const handle = await getSavedHandle();
  if (!handle) { wrap.innerHTML = ''; return; }

  // Check if permission already granted (no user gesture needed)
  try {
    const perm = await handle.queryPermission({ mode: 'read' });
    if (perm === 'granted') {
      wrap.innerHTML = `<div class="w-loading"><span class="w-spinner">⟳</span> ${t('opening', handle.name)}</div>`;
      await loadDir(handle);
      return;
    }
  } catch(e) {}

  // Permission expired → show reopen button (requires user click)
  wrap.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'w-reopen-btn';
  btn.innerHTML = t('reopenBtn', handle.name);
  btn.onclick = async () => {
    btn.disabled = true;
    btn.innerHTML = `<span class="w-spinner">⟳</span> ${t('requesting')}`;
    try {
      const perm = await handle.requestPermission({ mode: 'read' });
      if (perm === 'granted') {
        await loadDir(handle);
      } else {
        toast(t('permDenied'));
        btn.disabled = false;
        btn.innerHTML = t('reopenBtn', handle.name);
      }
    } catch(e) {
      toast(t('errGeneral') + e.message);
      btn.disabled = false;
      btn.innerHTML = t('reopenBtn', handle.name);
    }
  };
  wrap.appendChild(btn);
}

// ── Open folder ──
async function openFolder() {
  if ('showDirectoryPicker' in window) {
    try {
      const dh = await window.showDirectoryPicker({ mode: 'read' });
      await loadDir(dh);
    } catch (e) {
      if (e.name !== 'AbortError') toast(t('errGeneral') + e.message);
    }
  } else {
    id('dir-input').click();
  }
}

async function loadDir(dirHandle) {
  rootName = dirHandle.name;
  fileMap = {};
  treeData = await buildTree(dirHandle, '');
  saveHandle(dirHandle); // persist for next session
  finishLoad();
}

// Fallback: webkitdirectory
function onDirInput(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  fileMap = {};
  rootName = '';
  const dirMap = {};

  files.forEach(f => {
    const parts = f.webkitRelativePath.split('/');
    if (!rootName) rootName = parts[0];
    if (!/\.(md|markdown)$/i.test(f.name)) return;
    // Skip if any path segment is in SKIP set
    if (parts.some(p => SKIP.has(p))) return;
    const relParts = parts.slice(1);
    const filePath = relParts.join('/');
    fileMap[filePath] = f; // File object

    // Build dir nodes
    let cur = dirMap;
    for (let i = 0; i < relParts.length - 1; i++) {
      const seg = relParts[i];
      const dpath = relParts.slice(0, i + 1).join('/') + '/';
      if (!cur[dpath]) cur[dpath] = { kind: 'dir', name: seg, path: dpath, children: {}, expanded: true };
      cur = cur[dpath].children;
    }
    const fname = relParts[relParts.length - 1];
    cur[filePath] = { kind: 'file', name: fname, path: filePath };
  });

  treeData = mapToArr(dirMap);
  finishLoad();
}

function mapToArr(m) {
  return sortNodes(Object.values(m).map(n =>
    n.kind === 'dir' ? { ...n, children: mapToArr(n.children) } : n
  ));
}

function finishLoad() {
  id('root-name').textContent = rootName;
  const total = countFiles(treeData);
  id('cnt-badge').textContent = t('files', total);
  renderTree();
  showApp();

  // Count headings in all files (background, non-blocking)
  scanCtxAll(treeData);

  const last = ls('mdv-last-' + rootName);
  if (last && fileMap[last]) loadFile(last);
}

// Folders/files to always skip
const SKIP = new Set(['.git', '.svn', 'node_modules', '.next', '.vercel', '.nuxt',
  'dist', 'build', 'out', '.yarn', '__pycache__', '.DS_Store', '.vscode-server',
  'coverage', '.turbo', '.cache']);

// ── Tree builder (File System Access API) ──
async function buildTree(dirHandle, parentPath) {
  const entries = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (SKIP.has(name)) continue;
    // Skip hidden FILES but NOT hidden DIRS (we want .claude, .agent, etc.)
    if (handle.kind === 'file' && name.startsWith('.')) continue;
    const path = parentPath ? parentPath + '/' + name : name;
    if (handle.kind === 'directory') {
      const children = await buildTree(handle, path);
      if (children.length > 0) entries.push({ kind: 'dir', name, path: path + '/', handle, children, expanded: true });
    } else if (/\.(md|markdown)$/i.test(name)) {
      fileMap[path] = handle;
      entries.push({ kind: 'file', name, path, handle });
    }
  }
  return sortNodes(entries);
}

// ── Context + token count ──
const ctxCounts = {}; // filePath → { headings, tokens, chars }

function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  return n.toLocaleString('en-US'); // always comma-separated
}

function computeStats(text) {
  const headings = (text.match(/^#{1,3} /mg) || []).length;
  const chars = text.length;
  const tokens = Math.ceil(chars / 4);
  return { headings, tokens, chars };
}

function updateTreeBadge(filePath, stats) {
  const row = document.querySelector(`.tf[data-path="${CSS.escape(filePath)}"]`);
  if (!row) return;
  let badge = row.querySelector('.ctx-badge');
  if (!badge) { badge = document.createElement('span'); badge.className = 'ctx-badge'; row.appendChild(badge); }
  // Show token count prominently; context count as secondary
  const tokLabel = fmtNum(stats.tokens) + ' tok';
  badge.textContent = tokLabel;
  badge.title = fmtNum(stats.headings) + ' context · ' + fmtNum(stats.tokens) + ' tokens · ' + fmtNum(stats.chars) + ' chars';
}

async function countCtx(filePath, handle) {
  try {
    const f = handle instanceof File ? handle : await handle.getFile();
    const text = await f.text();
    const stats = computeStats(text);
    ctxCounts[filePath] = stats;
    updateTreeBadge(filePath, stats);
  } catch(e) {}
}

async function scanCtxAll(nodes) {
  const tasks = [];
  function collect(arr) {
    arr.forEach(n => {
      if (n.kind === 'file') tasks.push(countCtx(n.path, n.handle || fileMap[n.path]));
      else collect(n.children);
    });
  }
  collect(nodes);
  // Batch in groups of 10 to avoid flooding I/O
  for (let i = 0; i < tasks.length; i += 10) {
    await Promise.all(tasks.slice(i, i + 10));
  }
}

function sortNodes(arr) {
  return arr.sort((a, b) => {
    if (a.kind !== b.kind) return a.kind === 'dir' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
}

function countFiles(nodes) {
  return nodes.reduce((s, n) => s + (n.kind === 'file' ? 1 : countFiles(n.children)), 0);
}

// ── Tree icon mapper ──
function getIcon(name, kind, path) {
  if (kind === 'dir') {
    const d = name.toLowerCase();
    if (d === 'context')   return '🗓️';
    if (d === 'history')   return '📜';
    if (d === 'docs')      return '📚';
    if (d === '.claude')   return '⚙️';
    if (d === 'rules')     return '📐';
    if (d === 'commands')  return '🖥️';
    if (d === 'agents')    return '🤖';
    if (d === 'src')       return '💻';
    return '📁';
  }
  const n = name.toLowerCase();
  if (n === 'claude.md')                                    return '🤖';
  if (n === 'readme.md')                                    return '📋';
  if (n === 'index.md')                                     return '🗺️';
  if (n.startsWith('current_state') && n !== 'current_state_template.md') return '👤';
  if (n.includes('template'))                               return '📝';
  if (n === 'decisions.md')                                 return '⚖️';
  if (n === 'tech_debt.md')                                 return '🔧';
  if (n === 'feature_index.md')                             return '📊';
  if ((path || '').includes('history/'))                    return '📜';
  if (n.includes('architecture') || n.includes('stack'))    return '🏗️';
  if (n.includes('folder') || n.includes('structure'))      return '🗂️';
  if (n.includes('component'))                              return '🧩';
  if (n.includes('api') || n.includes('service'))           return '🔌';
  if (n.includes('query'))                                  return '🗄️';
  if (n.includes('rule') || n.includes('gotcha'))           return '📐';
  if (n.includes('pattern'))                                return '🔁';
  if (n.includes('workflow') || n.includes('handbook'))     return '⚡';
  if (n.includes('shared') || n.includes('util'))          return '🛠️';
  if (n.includes('state') || n.includes('redux'))           return '🔵';
  if (n.includes('security') || n.includes('auth'))         return '🔐';
  if (n.includes('test'))                                   return '✅';
  if (n.includes('hook'))                                   return '🪝';
  if (n.includes('type'))                                   return '🔷';
  if (/^\d{2}-/.test(n))                                    return '📖';
  return '📄';
}

  [/model|mode|chế độ|ai|claude|gpt/i,                        '🤖'],
  [/scope|phạm vi|limit|boundary/i,                           '🎯'],
  [/link|nav|navigation|route|điều hướng/i,                   '🔗'],
  [/color|style|theme|css|design/i,                           '🎨'],
  [/hook|custom.?hook|useXxx/i,                               '🪝'],
  [/type|interface|typescript|generic/i,                      '🔷'],
  [/mental.?model|concept|hiểu|understand/i,                  '🧠'],
  [/anti.?pattern|avoid|không nên|đừng/i,                     '🚫'],
  [/recovery|fix|debug|lỗi|error|fail/i,                      '🆘'],
  [/beginner|mới|start|week|tuần/i,                           '🌱'],
  [/advanced|nâng cao|expert|pro/i,                           '🔥'],
  [/end.?session|kết thúc|close|finish/i,                     '🏁'],
  [/context|load|nạp|memory/i,                                '📥'],
];

function addHeadingIcons(body) {
  body.querySelectorAll('h1,h2,h3').forEach(h => {
    const text = h.textContent.trim();
    // Skip if already starts with emoji
    if (/^\p{Emoji_Presentation}/u.test(text) || /^[\u{1F300}-\u{1FAFF}]/u.test(text)) return;
    for (const [pattern, icon] of HEADING_ICONS) {
      if (pattern.test(text)) {
        const span = document.createElement('span');
        span.className = 'h-icon';
        span.textContent = icon;
        h.insertBefore(span, h.firstChild);
        break;
      }
    }
  });
}

// ── Wrap H2 sections into cards ──
function wrapSections(body) {
  const nodes = Array.from(body.childNodes);
  body.innerHTML = '';

  let section = null;

  const flush = () => { if (section) { body.appendChild(section); section = null; } };

  nodes.forEach(node => {
    if (node.nodeType !== 1) { // text node → keep in current section
      if (section) section.appendChild(node);
      return;
    }
    const tag = node.tagName;
    if (tag === 'H1') {
      flush();
      const card = document.createElement('div');
      card.className = 'md-title-card';
      card.appendChild(node);
      body.appendChild(card);
    } else if (tag === 'H2') {
      flush();
      section = document.createElement('div');
      section.className = 'md-section';
      section.appendChild(node);
    } else if (tag === 'HR') {
      // HR between sections — flush current, skip the HR itself
      flush();
    } else {
      if (!section) {
        // Intro content before first H2
        section = document.createElement('div');
        section.className = 'md-intro';
      }
      section.appendChild(node);
    }
  });
  flush();
}

// ── Render tree ──
function renderTree(nodes = treeData, container = id('tree-body'), depth = 0) {
  if (depth === 0) container.innerHTML = '';

  nodes.forEach(node => {
    if (node.kind === 'dir') {
      const wrap = document.createElement('div');

      const hd = document.createElement('div');
      hd.className = 'td-hd';
      hd.style.paddingLeft = (depth * 13 + 6) + 'px';

      const chev = el('span', 'chev' + (node.expanded ? ' open' : ''), '▶');
      const ico = el('span', 'ti', node.expanded ? '📂' : '📁');
      const nm = el('span', 'tn', node.name);
      const cnt = el('span', 'fcnt', String(countFiles(node.children)));
      hd.append(chev, ico, nm, cnt);

      const ch = document.createElement('div');
      ch.className = 'td-ch' + (node.expanded ? '' : ' coll');

      renderTree(node.children, ch, depth + 1);

      hd.addEventListener('click', () => {
        node.expanded = !node.expanded;
        chev.className = 'chev' + (node.expanded ? ' open' : '');
        ico.textContent = node.expanded ? '📂' : '📁';
        ch.classList.toggle('coll', !node.expanded);
      });

      wrap.append(hd, ch);
      container.appendChild(wrap);
    } else {
      const row = document.createElement('div');
      row.className = 'tf' + (node.path === (focusedPath || activePath) ? ' active' : '');
      row.dataset.path = node.path;
      row.style.paddingLeft = (depth * 13 + 6) + 'px';
      row.title = node.path;

      row.append(
        el('span', 'ti', getIcon(node.name, 'file', node.path)),
        el('span', 'tn', node.name)
      );
      row.addEventListener('click', () => loadFile(node.path));
      container.appendChild(row);
    }
  });

  if (depth === 0 && nodes.length === 0) {
    container.appendChild(el('div', 't-empty', t('noMdFiles')));
  }
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  e.className = cls;
  if (text) e.textContent = text;
  return e;
}

// ── Search ──
function onSearch(e) {
  const q = e.target.value.toLowerCase().trim();
  id('search-x').style.display = q ? 'block' : 'none';
  applySearch(q);
}

function clearSearch() {
  id('search').value = '';
  id('search-x').style.display = 'none';
  applySearch('');
}

function onTreeKeydown(e) {
  if (isTextEntryTarget(e.target)) return;

  if (e.key === 'j') {
    e.preventDefault();
    moveTreeFocus(1);
  } else if (e.key === 'k') {
    e.preventDefault();
    moveTreeFocus(-1);
  } else if (e.key === 'Enter' && focusedPath) {
    e.preventDefault();
    loadFile(focusedPath);
  }
}

function isTextEntryTarget(target) {
  if (!target) return false;
  const tag = target.tagName;
  return target.isContentEditable || tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'BUTTON' || tag === 'A';
}

function visibleFileRows() {
  return Array.from(id('tree-body').querySelectorAll('.tf')).filter(row => row.getClientRects().length > 0);
}

function moveTreeFocus(delta) {
  const rows = visibleFileRows();
  if (rows.length === 0) return;

  const current = focusedPath || activePath;
  let index = rows.findIndex(row => row.dataset.path === current);
  if (index === -1) index = delta > 0 ? -1 : rows.length;

  const nextIndex = Math.max(0, Math.min(rows.length - 1, index + delta));
  setTreeFocus(rows[nextIndex].dataset.path, true);
}

function setTreeFocus(filePath, scroll = false) {
  focusedPath = filePath;
  id('tree-body').querySelectorAll('.tf').forEach(row => {
    row.classList.toggle('active', row.dataset.path === filePath);
  });

  if (scroll) {
    const focusedRow = id('tree-body').querySelector(`.tf[data-path="${CSS.escape(filePath)}"]`);
    if (focusedRow) focusedRow.scrollIntoView({ block: 'nearest' });
  }
}

function applySearch(q) {
  const allFiles = id('tree-body').querySelectorAll('.tf');
  let vis = 0;
  allFiles.forEach(row => {
    const name = row.querySelector('.tn').textContent.toLowerCase();
    const show = !q || name.includes(q);
    row.style.display = show ? '' : 'none';
    if (show) vis++;
  });

  // Show/hide dir wrappers based on visible children
  id('tree-body').querySelectorAll('.td-hd').forEach(hd => {
    const ch = hd.nextElementSibling;
    if (!ch) return;
    const hasVis = ch.querySelectorAll('.tf:not([style*="display: none"])').length > 0;
    const wrap = hd.parentElement;
    wrap.style.display = hasVis || !q ? '' : 'none';
    if (q && hasVis) ch.classList.remove('coll');
  });

  // Empty state
  let empty = id('t-empty-dyn');
  if (!empty) { empty = el('div', 't-empty', ''); empty.id = 't-empty-dyn'; id('tree-body').appendChild(empty); }
  empty.textContent = vis === 0 && q ? t('noResult', q) : '';
  empty.style.display = vis === 0 && q ? 'block' : 'none';
}

// ── Content stats bar ──
function renderCStats(stats) {
  const cstats = id('c-stats');
  cstats.style.display = 'flex';
  cstats.dataset.stats = JSON.stringify(stats);
  const u = t('units');
  cstats.innerHTML = `
    <div class="cst-chip"><span class="cst-icon">📊</span><span class="cst-num">${fmtNum(stats.headings)}</span><span class="cst-unit">${u.context}</span></div>
    <div class="cst-chip"><span class="cst-icon">🔤</span><span class="cst-num">${fmtNum(stats.tokens)}</span><span class="cst-unit">${u.tokens}</span></div>
    <div class="cst-chip"><span class="cst-icon">📝</span><span class="cst-num">${fmtNum(stats.chars)}</span><span class="cst-unit">${u.chars}</span></div>
  `;
}

// ── Load file ──
async function loadFile(filePath) {
  const handle = fileMap[filePath];
  if (!handle) return;

  let text;
  try {
    if (handle instanceof File) {
      text = await handle.text();
    } else {
      const f = await handle.getFile();
      text = await f.text();
    }
  } catch (e) {
    toast(t('errRead') + e.message);
    return;
  }

  activePath = filePath;
  focusedPath = filePath;
  ls('mdv-last-' + rootName, filePath);

  // Update active in tree
  setTreeFocus(filePath, true);

  // Breadcrumb
  const parts = filePath.split('/');
  const segs = [rootName, ...parts];
  id('breadcrumb').innerHTML = segs.map((s, i) => {
    if (i === segs.length - 1) return `<span class="bc-file">${s}</span>`;
    if (i === 0) return `<span class="bc-root">${s}</span>`;
    return `<span>${s}</span>`;
  }).join('<span class="bc-sep"> › </span>');

  // Reading time
  const words = text.trim().split(/\s+/).length;
  id('rtime').textContent = t('readTime', Math.max(1, Math.round(words / 200)));
  id('rtime').dataset.words = words;

  // Compute stats for this file (immediate — we already have text)
  const stats = computeStats(text);
  ctxCounts[filePath] = stats;
  updateTreeBadge(filePath, stats);

  // Update content-panel stats bar (top-right)
  renderCStats(stats);

  renderMarkdown(text, filePath);
  id('content-panel').scrollTo({ top: 0, behavior: 'instant' });
  if (window.innerWidth <= 720) id('tree-panel').classList.remove('mob-open');
}

// ── Frontmatter parser ──
function parseFrontmatter(text) {
  const m = text.match(/^---[ \t]*\r?\n([\s\S]*?)\r?\n---[ \t]*(\r?\n|$)/);
  if (!m) return { meta: null, body: text };
  const meta = {};
  m[1].split(/\r?\n/).forEach(line => {
    const colon = line.indexOf(':');
    if (colon < 1) return;
    const key = line.slice(0, colon).trim();
    const val = line.slice(colon + 1).trim();
    if (key) meta[key] = val;
  });
  return { meta, body: text.slice(m[0].length) };
}

// Render frontmatter as a metadata card
const PILL_KEYS = new Set(['allowed-tools', 'tools', 'tags', 'keywords', 'subagent_type']);

function renderFrontmatterCard(meta) {
  if (!meta || Object.keys(meta).length === 0) return null;
  const card = document.createElement('div');
  card.className = 'md-frontmatter';

  Object.entries(meta).forEach(([key, val]) => {
    const row = document.createElement('div');
    row.className = 'fm-row';

    const keyEl = document.createElement('div');
    keyEl.className = 'fm-key';
    keyEl.textContent = key.replace(/-/g, ' ');
    row.appendChild(keyEl);

    const valEl = document.createElement('div');
    valEl.className = 'fm-val';

    // Pill list for comma/whitespace-separated tool lists
    if (PILL_KEYS.has(key.toLowerCase()) && val.includes(',')) {
      const pills = document.createElement('div');
      pills.className = 'fm-pills';
      val.split(',').forEach(v => {
        const p = document.createElement('span');
        p.className = 'fm-pill';
        p.textContent = v.trim();
        pills.appendChild(p);
      });
      valEl.appendChild(pills);
    } else if (key.toLowerCase() === 'name') {
      valEl.innerHTML = `<code>${val}</code>`;
    } else {
      valEl.textContent = val;
    }
    row.appendChild(valEl);
    card.appendChild(row);
  });
  return card;
}

// ── Render markdown ──
function renderMarkdown(text) {
  const body = id('md-body');
  body.style.opacity = '0';

  // Strip & parse frontmatter before passing to marked
  const { meta, body: mdText } = parseFrontmatter(text);
  body.innerHTML = marked.parse(mdText);

  // Inject frontmatter card at top
  const fmCard = renderFrontmatterCard(meta);
  if (fmCard) body.insertBefore(fmCard, body.firstChild);

  // Add heading icons based on content
  addHeadingIcons(body);

  // Wrap H2 sections into cards
  wrapSections(body);

  // Heading IDs — GitHub-compatible: no strip leading dash, dedup with suffix only on collision
  const slugCount = {};
  body.querySelectorAll('h1,h2,h3,h4').forEach(h => {
    const iconSpan = h.querySelector('.h-icon');
    const rawText = iconSpan ? h.textContent.replace(iconSpan.textContent, '') : h.textContent;
    const slug = rawText.trim().toLowerCase()
      .replace(/[^\p{L}\p{N}\p{M}\s-]/gu, '')
      .replace(/\s+/g, '-').replace(/-+/g, '-')
      .slice(0, 60) || 'heading';
    slugCount[slug] = (slugCount[slug] || 0) + 1;
    h.id = slugCount[slug] === 1 ? slug : slug + '-' + (slugCount[slug] - 1);
  });

  // Syntax highlight
  body.querySelectorAll('pre code').forEach(block => {
    try { hljs.highlightElement(block); } catch(e) {}
  });

  // Copy buttons + lang badges
  body.querySelectorAll('pre').forEach(pre => {
    const code = pre.querySelector('code');
    const langClass = code && [...code.classList].find(c => c.startsWith('language-'));
    const lang = langClass ? langClass.replace('language-', '') : '';

    if (lang && lang !== 'plaintext') {
      const badge = document.createElement('span');
      badge.className = 'lang-badge';
      badge.textContent = lang;
      pre.appendChild(badge);
    }

    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.type = 'button';
    btn.addEventListener('click', () => {
      const content = (code ? code : pre).innerText;
      navigator.clipboard.writeText(content).then(() => {
        btn.textContent = '✓ Copied';
        setTimeout(() => btn.textContent = 'Copy', 1600);
      }).catch(() => {
        const ta = Object.assign(document.createElement('textarea'), { value: content });
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
        btn.textContent = '✓ Copied';
        setTimeout(() => btn.textContent = 'Copy', 1600);
      });
    });
    pre.appendChild(btn);
  });

  buildToc();

  requestAnimationFrame(() => {
    body.style.transition = 'opacity .18s';
    body.style.opacity = '1';
  });
}

// ── Cross-file .md link click ──
function onContentClick(e) {
  const a = e.target.closest('a');
  if (!a) return;
  const href = a.getAttribute('href') || '';
  if (!href || href.startsWith('http') || href.startsWith('//')) return;

  // In-page anchor link (e.g. TOC inside the .md file)
  if (href.startsWith('#')) {
    e.preventDefault();
    const target = id('md-body').querySelector(CSS.escape(href.slice(1)) ? '#' + CSS.escape(href.slice(1)) : href);
    if (target) {
      const cp = id('content-panel');
      const top = target.getBoundingClientRect().top + cp.scrollTop - cp.getBoundingClientRect().top - 8;
      cp.scrollTo({ top, behavior: 'smooth' });
    }
    return;
  }

  if (!/\.md(#.*)?$/i.test(href)) return;
  e.preventDefault();

  // Resolve relative to current file's directory
  const dir = activePath.includes('/') ? activePath.substring(0, activePath.lastIndexOf('/') + 1) : '';
  let target = href.replace(/^\.\//, '');

  // Handle ../
  let base = dir;
  while (target.startsWith('../')) {
    target = target.slice(3);
    base = base.replace(/[^/]+\/$/, '');
  }
  target = (base + target).replace(/^\//, '');
  target = target.split('#')[0]; // strip anchor

  if (fileMap[target]) {
    loadFile(target);
  } else {
    toast(t('fileNotFound', target));
  }
}

// ── TOC ──
function buildToc() {
  const nav = id('toc-nav');
  const panel = id('toc-panel');
  const body = id('md-body');
  const headings = body.querySelectorAll('h1,h2,h3');

  nav.innerHTML = '';
  if (headings.length < 2) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');

  headings.forEach(h => {
    const a = document.createElement('a');
    a.className = 'toc-a ' + h.tagName.toLowerCase();
    a.href = '#' + h.id;
    a.textContent = h.textContent.trim();
    a.addEventListener('click', e => {
      e.preventDefault();
      const cp = id('content-panel');
      const top = h.getBoundingClientRect().top + cp.scrollTop - cp.getBoundingClientRect().top - 8;
      cp.scrollTo({ top, behavior: 'smooth' });
    });
    nav.appendChild(a);
  });

  setupScrollSpy(headings, nav);
}

function setupScrollSpy(headings, nav) {
  if (tocObserver) tocObserver.disconnect();
  const links = nav.querySelectorAll('.toc-a');
  tocObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = nav.querySelector(`a[href="#${entry.target.id}"]`);
        if (active) { active.classList.add('active'); active.scrollIntoView({ block: 'nearest' }); }
      }
    });
  }, { root: id('content-panel'), rootMargin: '-8% 0px -82% 0px' });
  headings.forEach(h => tocObserver.observe(h));
}

// ── Scroll (progress + back-to-top) ──
function onScroll() {
  const cp = id('content-panel');
  const pct = cp.scrollTop / (cp.scrollHeight - cp.clientHeight) * 100 || 0;
  id('prog').style.width = Math.min(100, pct) + '%';
  id('btop').classList.toggle('on', cp.scrollTop > 280);
}

// ── Show app ──
function showApp() {
  id('welcome').style.display = 'none';
  id('app').style.display = 'flex';
}
