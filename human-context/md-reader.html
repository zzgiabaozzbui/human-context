<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-alt: #f8f9fa;
      --surface: #f1f3f5;
      --border: #dee2e6;
      --accent: #5c6bc0;
      --accent-light: #eef0fb;
      --text: #212529;
      --text-muted: #6c757d;
      --code-bg: #f6f8fa;
      --sidebar-w: 260px;
      --radius: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-alt);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Drop zone ── */
    #dropzone {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      transition: background 0.2s;
    }
    #dropzone.drag-over { background: var(--accent-light); }

    .drop-icon { font-size: 56px; }
    .drop-title { font-size: 20px; font-weight: 600; color: var(--text); }
    .drop-sub { font-size: 13px; color: var(--text-muted); }

    .drop-btn {
      display: inline-block;
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .drop-btn:hover { opacity: 0.88; }

    .drop-hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Layout ── */
    #reader { display: none; }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 52px;
    }

    #filename {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .open-btn {
      flex-shrink: 0;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      background: var(--surface);
      transition: background 0.15s;
    }
    .open-btn:hover { background: var(--border); }

    .toc-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .toc-label {
      padding: 0 16px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .toc-link {
      display: block;
      padding: 5px 16px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      line-height: 1.4;
      border-left: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .toc-link:hover { color: var(--text); background: var(--surface); }
    .toc-link.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-light); font-weight: 500; }
    .toc-link.h2 { padding-left: 24px; }
    .toc-link.h3 { padding-left: 36px; font-size: 11px; }

    /* ── Main content ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 48px 60px;
      max-width: calc(var(--sidebar-w) + 800px);
    }

    /* ── Markdown styles ── */
    .md-body { max-width: 740px; }

    .md-body h1 { font-size: 28px; font-weight: 700; margin: 0 0 24px; padding-bottom: 12px; border-bottom: 2px solid var(--border); color: var(--text); }
    .md-body h2 { font-size: 20px; font-weight: 700; margin: 40px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
    .md-body h3 { font-size: 16px; font-weight: 600; margin: 28px 0 10px; color: var(--text); }
    .md-body h4 { font-size: 14px; font-weight: 600; margin: 20px 0 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .md-body p { margin: 0 0 14px; font-size: 14px; }

    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }

    .md-body strong { font-weight: 700; }
    .md-body em { font-style: italic; }

    .md-body code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      color: #c0392b;
    }

    .md-body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
      margin: 0 0 16px;
      position: relative;
    }
    .md-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
    }

    .md-body pre .copy-code-btn {
      position: absolute;
      top: 8px; right: 8px;
      padding: 3px 10px;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-muted);
      transition: background 0.15s;
    }
    .md-body pre .copy-code-btn:hover { background: var(--border); color: var(--text); }

    .md-body blockquote {
      border-left: 3px solid var(--accent);
      background: var(--accent-light);
      padding: 10px 16px;
      margin: 0 0 16px;
      border-radius: 0 var(--radius) var(--radius) 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    .md-body blockquote p { margin: 0; }

    .md-body ul, .md-body ol {
      margin: 0 0 14px;
      padding-left: 22px;
      font-size: 14px;
    }
    .md-body li { margin-bottom: 4px; }
    .md-body li > ul, .md-body li > ol { margin: 4px 0 0; }

    /* Checkboxes */
    .md-body input[type="checkbox"] {
      margin-right: 6px;
      accent-color: var(--accent);
    }

    .md-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* Tables */
    .md-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 0 0 16px;
    }
    .md-body th {
      background: var(--surface);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border);
      font-size: 12px;
    }
    .md-body td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      vertical-align: top;
    }
    .md-body tr:nth-child(even) td { background: #fafbfc; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #212529;
      color: #fff;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ── Drop zone ── -->
<div id="dropzone">
  <div class="drop-icon">📄</div>
  <div class="drop-title">Kéo thả file .md vào đây</div>
  <div class="drop-sub">hoặc</div>
  <label class="drop-btn">
    Chọn file
    <input type="file" id="fileInput" accept=".md,.markdown" hidden>
  </label>
  <div class="drop-hint">Hỗ trợ: headers, tables, code blocks, checklists, blockquotes</div>
</div>

<!-- ── Reader ── -->
<div id="reader">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div id="filename">—</div>
        <label class="open-btn" title="Mở file khác">
          📂
          <input type="file" id="fileInput2" accept=".md,.markdown" hidden>
        </label>
      </div>
      <div class="toc-wrap">
        <div class="toc-label">Nội dung</div>
        <nav id="toc"></nav>
      </div>
    </aside>
    <main class="main">
      <article id="mdBody" class="md-body"></article>
    </main>
  </div>
</div>

<div id="toast">Đã copy!</div>

<script>
  // ── Config marked ──
  marked.setOptions({ gfm: true, breaks: false });

  // ── DOM refs ──
  const dropzone   = document.getElementById('dropzone');
  const reader     = document.getElementById('reader');
  const mdBody     = document.getElementById('mdBody');
  const tocEl      = document.getElementById('toc');
  const filenameEl = document.getElementById('filename');
  const toast      = document.getElementById('toast');

  // ── Load file ──
  function loadFile(file) {
    if (!file || !file.name.match(/\.(md|markdown)$/i)) return;
    const fr = new FileReader();
    fr.onload = e => renderMarkdown(e.target.result, file.name);
    fr.readAsText(file, 'utf-8');
  }

  // ── Render ──
  function renderMarkdown(text, filename) {
    // Render
    mdBody.innerHTML = marked.parse(text);

    // Filename
    filenameEl.textContent = filename;
    document.title = filename + ' — MD Reader';

    // Add IDs to headings
    mdBody.querySelectorAll('h1,h2,h3,h4').forEach((el, i) => {
      const id = el.textContent.trim().toLowerCase()
        .replace(/[^\w\sàáâãèéêìíòóôõùúýăđơư]/g, '')
        .replace(/\s+/g, '-').replace(/-+/g, '-').slice(0, 60) + '-' + i;
      el.id = id;
    });

    // Add copy button to code blocks
    mdBody.querySelectorAll('pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'copy-code-btn';
      btn.textContent = 'Copy';
      btn.onclick = () => {
        const code = pre.querySelector('code');
        navigator.clipboard.writeText(code ? code.innerText : pre.innerText);
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      };
      pre.style.position = 'relative';
      pre.appendChild(btn);
    });

    // Build TOC
    buildToc();

    // Show reader
    dropzone.style.display = 'none';
    reader.style.display = 'block';

    // Scroll to top
    window.scrollTo(0, 0);
  }

  // ── TOC ──
  function buildToc() {
    tocEl.innerHTML = '';
    const headings = mdBody.querySelectorAll('h1,h2,h3');
    if (headings.length === 0) return;

    headings.forEach(h => {
      const a = document.createElement('a');
      a.className = 'toc-link ' + h.tagName.toLowerCase();
      a.href = '#' + h.id;
      a.textContent = h.textContent.trim();
      a.onclick = e => {
        e.preventDefault();
        h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
      tocEl.appendChild(a);
    });

    setupScrollSpy();
  }

  // ── Scroll spy ──
  function setupScrollSpy() {
    const links = tocEl.querySelectorAll('.toc-link');
    if (!links.length) return;

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          links.forEach(l => l.classList.remove('active'));
          const active = tocEl.querySelector(`a[href="#${entry.target.id}"]`);
          if (active) active.classList.add('active');
        }
      });
    }, { rootMargin: '-10% 0px -80% 0px' });

    mdBody.querySelectorAll('h1,h2,h3').forEach(h => observer.observe(h));
  }

  // ── File input handlers ──
  document.getElementById('fileInput').addEventListener('change', e => loadFile(e.target.files[0]));
  document.getElementById('fileInput2').addEventListener('change', e => loadFile(e.target.files[0]));

  // ── Drag & drop ──
  ['dragenter','dragover'].forEach(ev =>
    dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('drag-over'); })
  );
  ['dragleave','drop'].forEach(ev =>
    dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('drag-over'); })
  );
  dropzone.addEventListener('drop', e => loadFile(e.dataTransfer.files[0]));

  // Also accept drop on reader area when file already loaded
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
</script>
</body>
</html>
